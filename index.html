<!DOCTYPE html>
<html>

<head>
    <title>COLOR TASK</title>

    <style>
        body {
            background-color: white;
        }
        
        .box {
            width: 300px;
            height: 350px;
            margin: auto;
            margin-top: 20px;
            background-color: black;
            border: 4px double gray;
            text-align: center;
            padding-top: 20px;
        }
        
        h3 {
            color: white;
            font-size: 45px;
        }
        
        input {
            width: 220px;
            height: 20px;
        }
        
        button {
            margin-top: 50px;
            padding: 8px 15px;
        }
    </style>
</head>

<body>

    <div class="box" id="colorBox">
        <h3>COLOR</h3>

        <input type="text" id="colorName" placeholder="Enter Color">

        <br>

        <button onclick="changecolor()">
            SUBMIT
        </button>
    </div>

    <script>
        function changecolor() {
            let color = document.getElementById("colorName").value;

            document.getElementById("colorBox").style.backgroundColor = color;
        }
    </script>

</body>

</html>
